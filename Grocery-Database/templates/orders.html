<h1>Orders</h1>

<table border="1">
<tr>
    <th>Order ID</th>
    <th>Customer ID</th>
    <th>Type</th>
    <th>Total</th>
</tr>

{% for order in orders %}
<tr>
    <td>{{ order.Order_ID }}</td>
    <td>{{ order.Customer_ID }}</td>
    <td>{{ order.Type }}</td>
    <td>{{ order.Total }}</td>
</tr>
{% endfor %}

</table>
